name: MLOps CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Test & Train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ api/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --statistics
        continue-on-error: false

      - name: Check formatting with black
        run: |
          black --check --line-length 100 src/ api/ tests/

      - name: Download dataset
        run: python data/download_data.py

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Train models
        run: |
          python -m src.train
        env:
          PYTHONPATH: .
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db

      - name: Upload trained models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Build Docker image
        run: |
          docker build -t heart-disease-api:${{ github.sha }} .

      - name: Smoke test Docker container
        run: |
          docker run -d --name test_api -p 8000:8000 \
            heart-disease-api:${{ github.sha }}
          sleep 15
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/
          docker logs test_api
          docker stop test_api && docker rm test_api
